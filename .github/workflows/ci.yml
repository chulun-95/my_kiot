name: CI

# Chạy test cho mọi PR và mọi push không phải master.
# Mục tiêu: chặn merge code hỏng. Deploy nằm ở workflow riêng (deploy.yml).
on:
  pull_request:
  push:
    branches-ignore: [master]

jobs:
  backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r backend/requirements.txt
      - name: Run pytest
        # Tests dùng SQLite in-memory + tự set env (xem tests/conftest.py)
        run: pytest

  frontend:
    name: Frontend lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build          # tsc -b && vite build — bắt lỗi type + build vỡ
