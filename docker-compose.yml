services:
  db:
    image: postgres:16-alpine
    container_name: pos_db
    environment:
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: pos_secret
      POSTGRES_DB: pos_db
    ports:
      - "5432:5432"
    volumes:
      - pos_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos_user -d pos_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pos_db_data:
