server {
    listen 443 ssl;
    http2 on;
    server_name app.tencuahang.vn;          # ĐỔI thành domain thật của bạn

    ssl_certificate     /etc/nginx/ssl/origin.pem;   # Cloudflare Origin Certificate
    ssl_certificate_key /etc/nginx/ssl/origin.key;

    client_max_body_size 12m;               # cho upload ảnh SP (khi bật R2)
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    root /usr/share/nginx/html;
    index index.html;

    # Asset có hash → cache vĩnh viễn
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: mọi route client-side → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API → uvicorn (giữ nguyên path; router đã prefix /api/v1)
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }
}

# HTTP → HTTPS (Cloudflare đã ép HTTPS, đây là dự phòng khi gọi thẳng IP)
server {
    listen 80;
    server_name app.tencuahang.vn;          # ĐỔI thành domain thật
    return 301 https://$host$request_uri;
}
