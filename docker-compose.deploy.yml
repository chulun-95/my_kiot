# Compose chạy TRÊN VPS — dùng image pull từ GHCR (KHÔNG build tại chỗ).
# IMAGE_TAG do workflow deploy.yml truyền (= git sha); mặc định 'latest' khi chạy tay.
services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=192MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "max_connections=40"
    mem_limit: 640m
    volumes:
      - pos_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/chulun-95/my_kiot-api:${IMAGE_TAG:-latest}
    restart: always
    env_file: .env.prod
    mem_limit: 768m
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 1"

  nginx:
    image: ghcr.io/chulun-95/my_kiot-nginx:${IMAGE_TAG:-latest}
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api

volumes:
  pos_db_data:
